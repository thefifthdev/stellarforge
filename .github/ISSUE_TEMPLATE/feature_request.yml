name: Feature request
description: Propose a new feature or enhancement.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap or pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [contract, web, server, client, docs, ci]
