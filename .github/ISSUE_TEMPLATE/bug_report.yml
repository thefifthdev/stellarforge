name: Bug report
description: Report a defect in the contract, web app, or server.
labels: ['bug']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: tx
    attributes:
      label: Testnet tx / contract id (if relevant)
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: OS, Node version, wallet, network (testnet/mainnet).
